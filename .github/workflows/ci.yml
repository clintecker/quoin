name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  test:
    name: swift test (macOS)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      # The app target lives outside the package; generate and build it so
      # the SwiftUI/AppKit shell is compile-verified too.
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build macOS app
        working-directory: App/macOS
        run: |
          xcodegen
          xcodebuild -project Quoin.xcodeproj -scheme Quoin -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" build | tail -40
