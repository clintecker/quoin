name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  test:
    name: swift test (macOS)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      # The app target lives outside the package; generate and build it so
      # the SwiftUI/AppKit shell is compile-verified too.
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build macOS app
        working-directory: App/macOS
        run: |
          xcodegen
          xcodebuild -project Quoin.xcodeproj -scheme Quoin -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" build | tail -40

      # Screenshot pipeline: UI test launches the app against the fixture
      # library and captures window PNGs, uploaded as artifacts. Entitlements
      # are dropped so the unsandboxed app can read the fixtures dir.
      - name: Capture screenshots
        working-directory: App/macOS
        continue-on-error: true
        run: |
          mkdir -p /tmp/quoin-fixtures /tmp/quoin-shots
          cp ../../Fixtures/*.md /tmp/quoin-fixtures/
          xcodebuild -project Quoin.xcodeproj -scheme Quoin -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS="" \
            TEST_RUNNER_QUOIN_SCREENSHOT_DIR=/tmp/quoin-shots \
            TEST_RUNNER_QUOIN_FIXTURES=/tmp/quoin-fixtures \
            test | tail -30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: /tmp/quoin-shots
          if-no-files-found: ignore
